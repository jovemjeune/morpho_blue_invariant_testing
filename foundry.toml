[profile.default]
libs = ["lib"]
names = true
sizes = true
via_ir = false
optimizer = true
optimizer_runs = 999999
evm_version = "paris"

[profile.default.invariant]
runs = 1024
depth = 128
fail_on_revert = false

[profile.default.fmt]
wrap_comments = true

[lint]
exclude_lints = [
    "unaliased-plain-import",
    "asm-keccak256",
    "unwrapped-modifier-logic",
]
ignore = [
    'test/**/*.sol'
]

# Upstream Morpho Blue production build (Medusa/fuzzing use default via_ir = false)
[profile.via_ir]
via_ir = true
bytecode_hash = "none"

[profile.echidna]
via_ir = false
optimizer = false

# See more config options https://github.com/foundry-rs/foundry/tree/master/crates/config
